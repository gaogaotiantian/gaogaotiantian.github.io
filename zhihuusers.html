<html>
  <head>
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-1.12.3.min.js"></script>
<script src="https://cdn.datatables.net/1.10.12/js/jquery.dataTables.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.12/css/jquery.dataTables.min.css"/>

    <script>
    $.fn.dataTable.ext.search.push(
      function( settings, data, dataIndex ) {
        var min = parseInt( $('#follower_min').val(), 10 );
        var max = parseInt( $('#follower_max').val(), 10 );
        var follwer = parseFloat( data[3] ) || 0; // use data for the age column
   
        if ( ( isNaN( min ) && isNaN( max ) ) ||
             ( isNaN( min ) && age <= max ) ||
             ( min <= age   && isNaN( max ) ) ||
             ( min <= age   && age <= max ) )
        {
            return true;
        }
        return false;
      }
    );
      $(document).ready(function() {
        $.getJSON("user.json", function(data) {
          userJSON = data
        })
        .fail(function(d, text, error){alert("ERR in getJSON!" + text + error)})
        .success(function() {
          var table = $('#user-table').DataTable( {
            data: userJSON,
            paging: false,
            columnDefs: [ {
              sortable: false,
              "class": "index",
              "data": null,
              "defaultContent": '',
              targets: [0]
            }], 
            columns: [
              {title:"排名"},
              {title:"用户", data:"NAME", "sortable": false, orderable: false},
              {title:"关注者", data:"FOLLOWER"},
              {title:"关注了", data:"FOLLOWEE"},
              {title:"回答数", data:"ANSWER_NUM"},
              {title:"赞同数", data:"AGREE_NUM"},
              {title:"关注回答比", data:"FARATIO"},
              {title:"赞同回答比", data:"AARATIO"},
              {title:"赞同关注比", data:"AFRATIO"}
            ],
            fixedColumns: true
          })
          table.on( 'order.dt search.dt', function () {
            table.column(0, {search:'applied', order:'applied'}).nodes().each( function (cell, i) {
                cell.innerHTML = i+1;
            } );
          } ).draw();
        })
      })
    </script>
  </head>
  <body>
    <div>
      关注者: <input id=follwer_min placeholder=min/>-<input id=follower_max placeholder=max/>
    </div>
    <table id="user-table" class="display compact">
    </table>
  </body>
</html>
