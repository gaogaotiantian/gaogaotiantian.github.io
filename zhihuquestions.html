<html>
  <head>
    <meta charset="UTF-8">
    <style>
      span {
        margin-right: 10px;
        margin-left: 10px;
      }
      span.lv {
        color: #009900;
      }
      span.hv {
        font-style: italic;
        font-weight: bold;
        color: #007700;
      }
      span.lh {
        color: #FF5555;
      }
      span.hh { 
        font-style: italic;
        font-weight: bold;
        color: #FF0000;
      }
      table {
        margin-left: auto;
        margin-right: auto;
        text-align: left;
      }
      tr:nth-child(even) {
        background:#DDDDDD;
      }
      div {
        margin: 0px;
        padding: 0px;
      }
      #full_content {
        margin-left: auto;
        margin-right: auto;
        height:100%;
      }
      #search_filters {
        position: absolute;
        background: #e0e0e0;
        text-align: center;
        width: 100%;
        height: 25px;
      }
      #scroll_wrapper {
        position: absolute;
        top: 25px;
        bottom: 0px;
        width: 100%;
        height: auto;
      }
      #actual_table_section {
        height: 100%;
        text-align: center;
        overflow-y: scroll;
      }
      body {
        margin: 0px;
        padding: 0px;
        height: 100%;
        text-align: center;
      }
    </style>
    <script src="http://ajax.aspnetcdn.com/ajax/jQuery/jquery-1.11.3.min.js"></script>

    <script type='text/javascript' src='https://s3.amazonaws.com/dynatable-docs-assets/js/jquery.dynatable.js'></script>
    <link rel="stylesheet" media="all" href="https://s3.amazonaws.com/dynatable-docs-assets/css/jquery.dynatable.css" />
    <script>
      var dbJSON = []
      $.dynatableSetup({
        features: {
          paginate : false
        },
        table: {
          defaultColumnIdStyle: 'noStyle'
        }
      });

      $(document).ready(function() {
        $.getJSON("db.json", function(data) {
          dbJSON = data
        })
        .fail(function(d, text, error){alert("Error in getJSON!" + text + error)})
        .success(function() {
          $('#question_table')
          .bind('dynatable:preinit', function(e, dynatable) {
            dynatable.utility.textTransform.noStyle = function(text) {
              switch (text)
              {
                case "问题":
                  return "NAME"
                case "关注":
                  return "FOCUS"
                case "答案数":
                  return "ANSWER"
                case "关注答案比":
                  return "FARATIO"
                case "最高答案赞同":
                  return "TOP_ANSWER_NUMBER"
                case "浏览":
                  return "REVIEW"
                case "首次评论":
                  return "FIRST_COMMENT"
                case "上次活跃时间":
                  return "ACTIVATE"
                case "加入数据库时间":
                  return "ADD_TIME"
                default:
                  return text
              }
              if (text == "abc")
                return "NAME"
              return text;
            };
          })
          .bind('dynatable:init', function(e, dynatable) {
            dynatable.queries.functions['min_focus'] = function(record, queryValue) {
              return record['FOCUS'] >= parseInt(queryValue);
            };
            dynatable.queries.functions['max_focus'] = function(record, queryValue) {
              return record['FOCUS'] <= parseInt(queryValue);
            };
            dynatable.queries.functions['min_answer'] = function(record, queryValue) {
              return record['ANSWER'] >= parseInt(queryValue);
            };
            dynatable.queries.functions['max_answer'] = function(record, queryValue) {
              return record['ANSWER'] <= parseInt(queryValue);
            };
            dynatable.queries.functions['min_ratio'] = function(record, queryValue) {
              return record['FARATIO'] >= parseInt(queryValue);
            };
            dynatable.queries.functions['max_ratio'] = function(record, queryValue) {
              return record['FARATIO'] <= parseInt(queryValue);
            };
            dynatable.queries.functions['min_highans'] = function(record, queryValue) {
              return record['TOP_ANSWER_NUMBER'] >= parseInt(queryValue);
            };
            dynatable.queries.functions['max_highans'] = function(record, queryValue) {
              return record['TOP_ANSWER_NUMBER'] <= parseInt(queryValue);
            };
            dynatable.queries.functions['min_review'] = function(record, queryValue) {
              return record['REVIEW'] >= parseInt(queryValue);
            };
            dynatable.queries.functions['max_review'] = function(record, queryValue) {
              return record['REVIEW'] <= parseInt(queryValue);
            };
          })
          .dynatable({
            features : {
              search: false
            },
            dataset : {
              records: dbJSON
            },
            inputs : {
              queries: $('#min_focus, #max_focus, #min_answer, #max_answer, #min_ratio, #max_ratio, #min_highans, #max_highans, #min_review, #max_review')
            }
          });
        })
      })
    </script>
  </head>
  <body>
    <div id="full_content">
      <div id="search_filters">
        关注数
        <input id="min_focus" style="width:45px">
        -
        <input id="max_focus" style="width:45px">
        答案数
        <input id="min_answer" style="width:45px">
        -
        <input id="max_answer" style="width:45px">
        关注答案比
        <input id="min_ratio" style="width:45px">
        -
        <input id="max_ratio" style="width:45px">
        最高答案
        <input id="min_highans" style="width:45px">
        -
        <input id="max_highans" style="width:45px">
        浏览数
        <input id="min_review" style="width:45px">
        -
        <input id="max_review" style="width:45px">
        <span>Made by and all rights reserved by <a href="http://www.zhihu.com/people/gao-tian-50">高天</a><span>
      </div>
      <div id="scroll_wrapper">
        <div id="actual_table_section">
          <table id="question_table">
            <thead>
              <th>问题</th>
              <th>关注</th>
              <th>答案数</th>
              <th>关注答案比</th>
              <th>最高答案赞同</th>
              <th>浏览</th>
              <th>首次评论</th>
              <th>上次活跃时间</th>
              <th>加入数据库时间</th>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
