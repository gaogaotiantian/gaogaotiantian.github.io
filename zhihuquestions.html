<html>
  <head>
    <meta charset="UTF-8">
    <script src="http://ajax.aspnetcdn.com/ajax/jQuery/jquery-1.11.3.min.js"></script>

    <script type='text/javascript' src='https://s3.amazonaws.com/dynatable-docs-assets/js/jquery.dynatable.js'></script>
    <link rel="stylesheet" media="all" href="https://s3.amazonaws.com/dynatable-docs-assets/css/jquery.dynatable.css" />
    <script>
      var dbJSON = []
      $.dynatableSetup({
        features: {
          paginate : false
        },
        table: {
          defaultColumnIdStyle: 'noStyle'
        }
      });

      $(document).ready(function() {
        $.getJSON("db.json", function(data) {
          dbJSON = data
        })
        .fail(function(d, text, error){alert("Error in getJSON!" + text + error)})
        .success(function() {
          $('#question_table').bind('dynatable:preinit', function(e, dynatable) {
            dynatable.utility.textTransform.noStyle = function(text) {
              switch (text)
              {
                case "名字":
                  return "NAME"
                case "关注":
                  return "FOCUS"
                case "答案数":
                  return "ANSWER"
                case "最高答案赞同":
                  return "TOP_ANSWER_NUMBER"
                case "浏览":
                  return "REVIEW"
                case "首次评论":
                  return "FIRST_COMMENT"
                case "上次活跃时间":
                  return "ACTIVATE"
                default:
                  return text
              }
              if (text == "abc")
                return "NAME"
              return text;
            };
          })

          $('#question_table').dynatable({
            dataset : {
              records: dbJSON
            }
          });
          console.log(dbJSON)
        })
      })
    </script>
  </head>
  <body>
    <div>
      <table id="question_table">
        <thead>
          <th>名字</th>
          <th>关注</th>
          <th>答案数</th>
          <th>最高答案赞同</th>
          <th>浏览</th>
          <th>首次评论</th>
          <th>上次活跃时间</th>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </body>
</html>
