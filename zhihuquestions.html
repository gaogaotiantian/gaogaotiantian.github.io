<html>
  <head>
    <meta charset="UTF-8">
    <style>
      span {
        margin-right: 10px;
        margin-left: 10px;
      }
      span.lv {
        color: #009900;
      }
      span.hv {
        font-style: italic;
        font-weight: bold;
        color: #007700;
      }
      span.lh {
        color: #FF5555;
      }
      span.hh { 
        font-style: italic;
        font-weight: bold;
        color: #FF0000;
      }
    </style>
    <script src="http://ajax.aspnetcdn.com/ajax/jQuery/jquery-1.11.3.min.js"></script>

    <script type='text/javascript' src='https://s3.amazonaws.com/dynatable-docs-assets/js/jquery.dynatable.js'></script>
    <link rel="stylesheet" media="all" href="https://s3.amazonaws.com/dynatable-docs-assets/css/jquery.dynatable.css" />
    <script>
      var dbJSON = []
      $.dynatableSetup({
        features: {
          paginate : false
        },
        table: {
          defaultColumnIdStyle: 'noStyle'
        }
      });

      $(document).ready(function() {
        $.getJSON("db.json", function(data) {
          dbJSON = data
        })
        .fail(function(d, text, error){alert("Error in getJSON!" + text + error)})
        .success(function() {
          $('#question_table')
          .bind('dynatable:preinit', function(e, dynatable) {
            dynatable.utility.textTransform.noStyle = function(text) {
              switch (text)
              {
                case "名字":
                  return "NAME"
                case "关注":
                  return "FOCUS"
                case "答案数":
                  return "ANSWER"
                case "关注答案比":
                  return "FARATIO"
                case "最高答案赞同":
                  return "TOP_ANSWER_NUMBER"
                case "浏览":
                  return "REVIEW"
                case "首次评论":
                  return "FIRST_COMMENT"
                case "上次活跃时间":
                  return "ACTIVATE"
                default:
                  return text
              }
              if (text == "abc")
                return "NAME"
              return text;
            };
          })
          .bind('dynatable:init', function(e, dynatable) {
            dynatable.queries.functions['min_focus'] = function(record, queryValue) {
              console.log(record['FOCUS'])
              return record['FOCUS'] >= parseInt(queryValue);
            };
          })
          .dynatable({
            features : {
              search: false
            },
            dataset : {
              records: dbJSON
            },
            inputs : {
              queries: $('#min_focus'), $('#max_focus')
            }
          });
        })
      })
    </script>
  </head>
  <body>
    <div>
      <div id="search_filters">
        关注数
        <input id="min_focus" style="width:45px">
        -
        <input id="max_focus" style="width:45px">
      </div>
      <table id="question_table">
        <thead>
          <th>名字</th>
          <th>关注</th>
          <th>答案数</th>
          <th>关注答案比</th>
          <th>最高答案赞同</th>
          <th>浏览</th>
          <th>首次评论</th>
          <th>上次活跃时间</th>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </body>
</html>
